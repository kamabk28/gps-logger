<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Speed Logger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SPEED RECORDER</h1>
        
        <div class="dashboard">
            <div class="time-display" id="timeDisplay">00:00:00</div>
            <div class="speed-box">
                <span id="speedDisplay">0.0</span>
                <span class="unit">km/h</span>
            </div>
            <div class="stats-box">
                <div>最高速度: <span id="maxSpeedDisplay">0.0</span> km/h</div>
            </div>
        </div>

        <div class="options">
            <label class="checkbox-label">
                <input type="checkbox" id="autoDownloadCb">
                <span class="checkmark"></span>
                停止時に自動ダウンロード
            </label>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn primary">記録開始</button>
            <button id="stopBtn" class="btn danger" disabled>停止</button>
        </div>

        <div class="sub-controls">
            <button id="downloadBtn" class="btn success" disabled>CSVダウンロード</button>
            <button id="clearBtn" class="btn secondary" disabled>リセット</button>
        </div>

        <div class="debug-info">
            <p>状態: <span id="statusDisplay" class="status-badge">待機中</span></p>
            <p>記録数: <span id="countDisplay">0</span> 件</p>
            <p>GPS精度: <span id="accuracyDisplay">-</span> m</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
